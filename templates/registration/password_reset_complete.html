{% extends 'base.html' %}

{% block title %}Senha alterada - Tech Hub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2><span class="material-icons">check_circle</span> Senha alterada com sucesso</h2>
        <p style="text-align: center; color: #999; margin-bottom: 2rem;">
            Sua senha foi alterada com sucesso. Agora você pode fazer login com sua nova senha.
        </p>

        <div class="auth-links">
            <a href="{% url 'login' %}"><span class="material-icons">login</span> Fazer login</a>
        </div>
    </div>
</div>
{% endblock %}
