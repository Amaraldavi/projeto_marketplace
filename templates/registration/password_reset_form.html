{% extends 'base.html' %}

{% block title %}Esqueci minha senha - Tech Hub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2><span class="material-icons">lock_reset</span> Esqueci minha senha</h2>
        <p style="text-align: center; color: #999; margin-bottom: 2rem;">
            Digite seu endereço de e-mail e enviaremos instruções para redefinir sua senha.
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_email"><span class="material-icons">email</span> E-mail</label>
                <input type="email" id="id_email" name="email" required>
            </div>

            <div class="form-group">
                <button type="submit"><span class="material-icons">send</span> Enviar instruções</button>
            </div>
        </form>

        <div class="auth-links">
            <a href="{% url 'login' %}"><span class="material-icons">arrow_back</span> Voltar ao login</a>
        </div>
    </div>
</div>
{% endblock %}
