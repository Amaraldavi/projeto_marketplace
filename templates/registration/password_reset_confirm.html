{% extends 'base.html' %}

{% block title %}Nova senha - Tech Hub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2><span class="material-icons">lock_reset</span> Definir nova senha</h2>
        <p style="text-align: center; color: #999; margin-bottom: 2rem;">
            Digite sua nova senha abaixo.
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_new_password1"><span class="material-icons">lock</span> Nova senha</label>
                <div class="password-container">
                    <input type="password" id="id_new_password1" name="new_password1" required>
                    <button type="button" class="password-toggle" onclick="togglePassword1()">
                        <span class="material-icons" id="password-icon-1">visibility</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="id_new_password2"><span class="material-icons">lock</span> Confirmar nova senha</label>
                <div class="password-container">
                    <input type="password" id="id_new_password2" name="new_password2" required>
                    <button type="button" class="password-toggle" onclick="togglePassword2()">
                        <span class="material-icons" id="password-icon-2">visibility</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <button type="submit"><span class="material-icons">save</span> Alterar senha</button>
            </div>
        </form>

        <div class="auth-links">
            <a href="{% url 'login' %}"><span class="material-icons">arrow_back</span> Voltar ao login</a>
        </div>
    </div>
</div>

<script>
function togglePassword1() {
    const passwordInput = document.getElementById('id_new_password1');
    const passwordIcon = document.getElementById('password-icon-1');

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        passwordIcon.textContent = 'visibility_off';
    } else {
        passwordInput.type = 'password';
        passwordIcon.textContent = 'visibility';
    }
}

function togglePassword2() {
    const passwordInput = document.getElementById('id_new_password2');
    const passwordIcon = document.getElementById('password-icon-2');

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        passwordIcon.textContent = 'visibility_off';
    } else {
        passwordInput.type = 'password';
        passwordIcon.textContent = 'visibility';
    }
}
</script>

{% endblock %}
