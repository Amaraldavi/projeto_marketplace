{% if messages %}
<div class="messages-container" aria-live="polite" aria-atomic="true">
    {% for message in messages %}
        <div class="message message-{{ message.tags }}" data-auto-hide="true" role="status">
            <span class="message-text">{{ message }}</span>
            <button type="button" class="message-close" aria-label="Fechar mensagem">&times;</button>
        </div>
    {% endfor %}
</div>
{% endif %}
