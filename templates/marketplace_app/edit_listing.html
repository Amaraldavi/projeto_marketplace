{% extends 'base.html' %}

{% block title %}Editar Anúncio{% endblock %}

{% block content %}
<div class="container">
    <h2 class="section-title"><span class="material-icons">edit</span> Editar Anúncio</h2>

    <div class="form-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-secondary">Salvar alterações</button>
            <a href="{% url 'my_listings' %}" class="btn-primary" style="margin-left: 1rem;">Voltar</a>
        </form>
    </div>

</div>
{% endblock %}
