<h2>Cadastro</h2>

<form method="post">
    {% csrf_token %}

    <label>Usuário:</label>
    <input type="text" name="username">

    <br><br>

    <label>Senha:</label>
    <input type="password" name="password">

    <br><br>

    <label>É loja?</label>
    <input type="checkbox" name="is_store">

    <br><br>

    <button type="submit">Cadastrar</button>
</form>
