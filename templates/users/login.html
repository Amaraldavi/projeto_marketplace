<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    
    <label>Usuário:</label>
    <input type="text" name="username">

    <br><br>

    <label>Senha:</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">Entrar</button>
</form>

<a href="/register/">Criar conta</a>
