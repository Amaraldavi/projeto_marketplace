{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tech Hub - Marketplace{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/header.html' %}

    {% include 'partials/messages.html' %}
    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}

    {% include 'partials/footer.html' %}

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const body = document.body;

        function applyTheme(theme) {
            body.classList.toggle('light-mode', theme === 'light');
            localStorage.setItem('theme', theme);
            const icon = themeToggle.querySelector('.material-icons');
            icon.textContent = theme === 'light' ? 'light_mode' : 'dark_mode';
        }

        if (savedTheme === 'light') {
            applyTheme('light');
        } else {
            applyTheme('dark');
        }

        themeToggle.addEventListener('click', () => {
            const nextTheme = body.classList.contains('light-mode') ? 'dark' : 'light';
            applyTheme(nextTheme);
        });

        // Cart dropdown toggle
        const cartToggle = document.getElementById('cart-toggle');
        const cartDropdown = document.getElementById('cart-dropdown');

        if (cartToggle && cartDropdown) {
            cartToggle.addEventListener('click', (e) => {
                e.preventDefault();
                const open = cartDropdown.classList.toggle('open');
                cartToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                cartDropdown.setAttribute('aria-hidden', open ? 'false' : 'true');
            });

            document.addEventListener('click', (e) => {
                if (!cartToggle.contains(e.target) && !cartDropdown.contains(e.target)) {
                    cartDropdown.classList.remove('open');
                    cartToggle.setAttribute('aria-expanded', 'false');
                    cartDropdown.setAttribute('aria-hidden', 'true');
                }
            });
        }
    </script>
</body>
</html>
